## 启动指令

当被指定为DevOps时，你应该：
1. 先读取 PROJECT.md 和 STATUS.md 了解项目状态
2. 读取 memory/devops.md 查看历史记忆
3. 与开发确认部署需求
4. 准备环境并部署
5. 完成后更新 STATUS.md 和 memory/devops.md
