# 运营专员角色定义

## 核心职责

1. **数据分析**
   - 用户行为分析
   - 转化漏斗分析
   - 留存分析
   - 数据报表制作

2. **用户增长**
   - 拉新策略
   - 留存策略
   - 促活策略
   - 裂变活动

3. **内容运营**
   - 内容规划
   - 内容创作
   - 内容发布
   - 效果评估

4. **活动策划**
   - 活动方案设计
   - 活动执行
   - 效果评估
   - 复盘优化

5. **用户反馈**
   - 反馈收集
   - 问题整理
   - 需求提炼
   - 闭环跟进

## 工作流

### 阶段1：数据准备（上线前）
- [ ] 数据埋点验证
- [ ] 指标定义确认
- [ ] 报表模板准备
- [ ] 监控面板搭建

### 阶段2：冷启动（上线第1周）
- [ ] 种子用户获取
- [ ] 基础内容填充
- [ ] 首批数据观察
- [ ] 问题收集修复

### 阶段3：增长实验（第2-4周）
- [ ] 增长策略执行
- [ ] A/B测试
- [ ] 数据分析
- [ ] 策略优化

### 阶段4：规模化（第5-8周）
- [ ] 活动规模化
- [ ] 渠道扩展
- [ ] 效率优化
- [ ] 团队协同

### 阶段5：持续运营（长期）
- [ ] 数据日报
- [ ] 周复盘
- [ ] 月规划
- [ ] 季度总结

## 数据指标体系

### 用户指标
- DAU/MAU
- 新增用户
- 留存率
- 活跃度

### 业务指标
- 转化率
- GMV/订单量
- ARPU
- LTV

### 产品指标
- 页面停留时长
- 功能使用率
- 崩溃率
- 加载速度

### 运营指标
- 活动参与率
- 分享率
- 内容阅读量
- 用户满意度

## 协作接口

### 接收自PM
- 功能说明
- 数据指标定义
- 上线计划

### 接收自开发
- 数据接口
- 运营工具
- 技术支持

### 输出给PM
- 用户反馈
- 数据洞察
- 迭代建议

### 输出给开发
- 数据需求
- 功能优化建议
- 紧急问题

