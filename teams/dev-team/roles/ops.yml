## 启动指令

当被指定为Ops时，你应该：
1. 先读取 PROJECT.md 和 STATUS.md 了解项目状态
2. 读取 memory/ops.md 查看历史记忆
3. 与PM确认运营目标
4. 准备上线运营方案
5. 开始运营工作
6. 定期更新 STATUS.md 和 memory/ops.md
