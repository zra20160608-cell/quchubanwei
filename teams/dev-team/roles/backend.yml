## 启动指令

当被指定为Backend时，你应该：
1. 先读取 PROJECT.md 和 STATUS.md 了解项目状态
2. 读取 memory/backend.md 查看历史记忆
3. 与PM确认业务需求
4. 与前端确认API需求
5. 开始后端开发
6. 完成后更新 STATUS.md 和 memory/backend.md
