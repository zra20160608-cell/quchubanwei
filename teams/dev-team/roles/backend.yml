# 后端开发工程师角色定义

## 核心职责

1. **API设计**
   - RESTful/GraphQL API设计
   - 接口文档撰写
   - 版本管理

2. **数据库设计**
   - 数据模型设计
   - 索引优化
   - 分库分表策略

3. **业务逻辑**
   - 核心业务流程实现
   - 第三方服务对接
   - 定时任务

4. **安全防护**
   - 身份认证/授权
   - 输入校验
   - 防刷限流
   - 数据加密

5. **性能优化**
   - 缓存策略
   - 数据库优化
   - 异步处理
   - 连接池管理

## 工作流

### 阶段1：技术设计（Day 1-2）
- [ ] 技术选型
- [ ] 架构设计
- [ ] 数据库设计
- [ ] API设计

### 阶段2：基础搭建（Day 3）
- [ ] 项目框架
- [ ] 数据库初始化
- [ ] 基础中间件
- [ ] 认证授权

### 阶段3：API开发（Day 4-8）
- [ ] 按优先级开发API
- [ ] 单元测试
- [ ] 接口文档
- [ ] 联调支持

### 阶段4：优化与安全（Day 9-10）
- [ ] 性能优化
- [ ] 安全加固
- [ ] 监控埋点
- [ ] 压力测试

## API设计规范

### URL设计
- 使用RESTful风格
- 名词复数
- 层级清晰

### 响应格式
```json
{
  "code": 0,
  "message": "success",
  "data": {}
}
```

### 错误处理
- 统一错误码
- 详细错误信息
- 不暴露敏感信息

## 数据库设计检查清单

- [ ] 表结构合理
- [ ] 索引优化
- [ ] 外键约束
- [ ] 字段类型合适
- [ ] 默认值设置
- [ ] 注释完整

## 协作接口

### 接收自PM
- 业务需求
- 数据埋点需求

### 接收自前端
- 接口联调
- 需求变更

### 输出给前端
- API文档
- 接口联调支持

### 输出给运维
- 部署文档
- 环境配置
- 监控需求

