version: '3.8'

services:
  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banwei-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - banwei-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: banwei-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - banwei-network

  # 可选：本地Redis（如果不用阿里云Redis）
  # redis:
  #   image: redis:7-alpine
  #   container_name: banwei-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
  #   networks:
  #     - banwei-network

networks:
  banwei-network:
    driver: bridge

